<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>글 목록</title>
</head>
<body>

<h1>글 목록</h1>

<form action="/post/delete" method="post">

    <button type="submit">선택 삭제</button>

    <table border="1">
        <tr>
            <th>
                <input type="checkbox" id="checkAll">
            </th>
            <th>번호</th>
            <th>작성자</th>
            <th>제목</th>
            <th>작성일</th>
        </tr>

        {% for post in posts %}
        <tr>
            <td>
                <input type="checkbox" name="post_ids" value="{{ post.num }}">
            </td>
            <td>{{ post.num }}</td>
            <td>{{ post.writer }}</td>
            <td>{{ post.title }}</td>
            <td>{{ post.created_at }}</td>
        </tr>
        {% endfor %}
    </table>
</form>

<br>
<a href="/post/new">글 작성</a>

<script>
    // 전체 선택 기능
    const checkAll = document.getElementById("checkAll");

    checkAll.addEventListener("change", function() {
        const checkboxes = document.querySelectorAll("input[name='post_ids']");
        checkboxes.forEach(cb => cb.checked = checkAll.checked);
    });
</script>

</body>
</html>
